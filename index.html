<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>口述行动链 · 校园行动规划智能体</title>
    <link rel="stylesheet" href="/agent.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="ambient ambient-sun"></div>
      <div class="ambient ambient-aqua"></div>
      <div class="ambient ambient-peach"></div>

      <aside class="sidebar glass">
        <div class="brand">
          <span class="mark">D7</span>
          <div>
            <p>GROUP 07</p>
            <h1>口述行动链</h1>
          </div>
        </div>

        <section class="intro">
          <span class="pill">Dify + 自研规则解析</span>
          <h2>校园行动规划智能体</h2>
          <p>
            面向校园办事、活动策划、材料预审和时间冲突检测，把一段通知或一句想法变成可执行、可检查、可取舍的行动方案。
          </p>
        </section>

        <section class="capabilities">
          <h3>核心能力</h3>
          <div class="capability">
            <span class="cap-index">01</span>
            <strong>通知解析</strong>
            <span>识别报名截止、提交时间、活动时间、地点和材料。</span>
          </div>
          <div class="capability">
            <span class="cap-index">02</span>
            <strong>活动策划</strong>
            <span>生成分工、预算、物资、审批和当天执行流程。</span>
          </div>
          <div class="capability">
            <span class="cap-index">03</span>
            <strong>冲突检测</strong>
            <span>判断任务是否排得开，并给出调整、委托或放弃建议。</span>
          </div>
        </section>

        <section class="examples">
          <h3>推荐演示问题</h3>
          <button data-prompt="请于2026年5月25日15:00前完成报名。现场抽签时间为2026年5月27日中午12:30，地点为体育部105会议室。比赛时间为2026年5月30日8点至18点。帮我整理行动清单。">通知解析</button>
          <button data-prompt="我想策划一次班级篮球交流赛，预计30人参加，预算500元，需要场地、分工、物资和当天流程。">活动策划</button>
          <button data-prompt="2026年第18届大广赛提交平台5月10日开放，6月12日16:00截止，学校线下提交时间为6月12日至14日每天9:00-17:00，6月18日24:00前可以退赛。请帮我区分这些时间。">多时间点</button>
          <button data-prompt="我6月29日开始期末考试，前两周要复习高数、概率论、马原、英语、物理、离散数学。同时6月18日前还要处理大广赛，6月18日晚上还有学生工作例会。帮我判断是否排得开。">冲突检测</button>
        </section>

        <section class="links">
          <a href="./algorithm.html" target="_blank">自研算法演示台</a>
          <a href="https://udify.app/chat/719EqByTRKYYG25i" target="_blank">新窗口打开智能体</a>
        </section>
      </aside>

      <section class="chat-panel glass">
        <header class="chat-header">
          <div>
            <p>LIVE AGENT</p>
            <h2>Dify 工作流 + 知识库检索</h2>
          </div>
          <span class="status">已发布</span>
        </header>

        <div class="prompt-copy" id="promptCopy">
          <span>点击左侧演示问题，可复制到剪贴板后粘贴进右侧对话框。</span>
          <strong id="copyStatus">等待选择</strong>
        </div>

        <iframe
          title="口述行动链 Dify 智能体"
          src="https://udify.app/chat/719EqByTRKYYG25i"
          allow="clipboard-read; clipboard-write"
        ></iframe>
      </section>
    </main>
    <script src="/agent.js"></script>
  </body>
</html>
